<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Investigación de Armario</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="wardrobe-game">
        <div id="close-btn">&times;</div>
        
        <div class="pocket" id="pocket-1" data-type="empty"></div>
        <div class="pocket" id="pocket-2" data-type="empty"></div>
        <div class="pocket" id="pocket-3" data-type="sticky"></div>
        <div class="pocket" id="pocket-4" data-type="empty"></div>
        <div class="pocket" id="pocket-5" data-type="empty"></div>

        <div id="sticky-note">
            <span class="code">4783</span>
        </div>
    </div>

    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
